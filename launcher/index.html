 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Game Launcher</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --hover:#334155;
    --accent:#3b82f6;
    --text:#f8fafc;
    --muted:#94a3b8;
}

body{
    font-family:system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:30px;
}

h1{
    margin-bottom:20px;
}

#search{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--card);
    color:white;
    margin-bottom:20px;
}

#categories{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.cat{
    border:none;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    background:var(--card);
    color:white;
}

.cat.active{
    background:var(--accent);
}

#games{
    display:grid;
    gap:12px;
}

.game{
    background:var(--card);
    padding:16px;
    border-radius:12px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.game:hover{
    background:var(--hover);
}

.desc{
    color:var(--muted);
    font-size:14px;
}

.play{
    background:var(--accent);
    color:white;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
}
</style>
</head>
<body>

<h1 id="title">Loading...</h1>

<input
    id="search"
    placeholder="Search games..."
>

<div id="categories"></div>
<div id="games"></div>

<script>
let allGames = [];
let activeCategory = "All";

const titleEl = document.getElementById("title");
const gamesEl = document.getElementById("games");
const categoriesEl = document.getElementById("categories");
const searchEl = document.getElementById("search");

async function loadGames() {

    const response =
        await fetch("games.json");

    const data =
        await response.json();

    titleEl.textContent =
        data.title || "Games";

    allGames = data.games;

    buildCategories();
    renderGames();
}

function buildCategories() {

    categoriesEl.innerHTML = "";

    const categories = [
        "All",
        ...new Set(
            allGames.map(
                game => game.category
            )
        )
    ];

    categories.forEach(category => {

        const button =
            document.createElement("button");

        button.className =
            "cat" +
            (category === "All"
                ? " active"
                : "");

        button.textContent =
            category;

        button.onclick = () => {

            activeCategory =
                category;

            document
                .querySelectorAll(".cat")
                .forEach(btn =>
                    btn.classList.remove("active")
                );

            button.classList.add("active");

            renderGames();
        };

        categoriesEl.appendChild(button);
    });
}

function renderGames() {

    const search =
        searchEl.value.toLowerCase();

    gamesEl.innerHTML = "";

    const filtered =
        allGames.filter(game => {

            const matchesSearch =
                game.name
                    .toLowerCase()
                    .includes(search) ||

                game.description
                    .toLowerCase()
                    .includes(search);

            const matchesCategory =
                activeCategory === "All" ||
                game.category === activeCategory;

            return matchesSearch &&
                   matchesCategory;
        });

    filtered.forEach(game => {

        const div =
            document.createElement("div");

        div.className = "game";

        div.innerHTML = `
            <div>
                <h3>${game.name}</h3>
                <div class="desc">
                    ${game.description}
                </div>
            </div>

            <a
                class="play"
                href="${game.file}">
                Play
            </a>
        `;

        gamesEl.appendChild(div);
    });
}

searchEl.addEventListener(
    "input",
    renderGames
);

loadGames();
</script>

</body>
</html>
