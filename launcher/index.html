<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Games</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #ffffff;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 { margin: 0; font-size: 24px; }

        .search-bar {
            background: var(--card-bg);
            border: 1px solid #3f3f46;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
            outline: none;
        }

        .games-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #27272a;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .game-thumb {
            width: 100%;
            height: 140px;
            background: #2d2d34;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            object-fit: cover;
        }

        .game-info { padding: 15px; }
        .game-title { margin: 0 0 5px 0; font-size: 18px; }
        .game-genre { color: #a1a1aa; font-size: 12px; text-transform: uppercase; }

        /* Modal Overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 960px;
            height: 80vh;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: var(--card-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 My Games Library</h1>
        <input type="text" id="search" class="search-bar" placeholder="Search games..." oninput="filterGames()">
    </header>

    <main class="games-grid" id="gamesGrid"></main>

    <!-- Game Player Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
    <h3 id="modalTitle" style="margin:0;">Game Title</h3>
    <div class="modal-controls" style="display: flex; align-items: center; gap: 20px;">
        <!-- THIS IS THE FULLSCREEN BUTTON -->
        <button class="control-btn" title="Toggle Fullscreen" onclick="toggleFullscreen()" style="background: none; border: none; color: #a1a1aa; font-size: 20px; cursor: pointer;">⛶</button>
        <button class="control-btn close-btn" title="Close Game" onclick="closeGame()" style="background: none; border: none; color: #a1a1aa; font-size: 26px; cursor: pointer;">&times;</button>
    </div>
</div>


    <script>
        // CONFIGURATION: Add your local game folders and files here!
        const games = [
            {
                title: "Stick Battle",
                path: "games/stickbattle/index.html", // Relative path to your game entry file
                thumb: "🍄",                   // Emoji or image URL path
                genre: "Fighting (TWO PLAYER)"
            },
        ];

        const grid = document.getElementById('gamesGrid');
        const modal = document.getElementById('gameModal');
        const frame = document.getElementById('gameFrame');
        const modalTitle = document.getElementById('modalTitle');

        // Render library cards
        function displayGames(gamesList) {
            grid.innerHTML = "";
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => launchGame(game.title, game.path);

                // Check if thumb is image URL or emoji string
                const isImg = game.thumb.includes('.') || game.thumb.startsWith('http');
                const visual = isImg ? `<img src="${game.thumb}" class="game-thumb" alt="${game.title}">` : `<div class="game-thumb">${game.thumb}</div>`;

                card.innerHTML = `
                    ${visual}
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <span class="game-genre">${game.genre}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Action commands
        function launchGame(title, path) {
            modalTitle.innerText = title;
            frame.src = path;
            modal.style.display = 'flex';
            frame.focus();
        }

        function closeGame() {
            modal.style.display = 'none';
            frame.src = ''; // Unloads the game to stop background audio
        }

        function filterGames() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = games.filter(g => g.title.toLowerCase().includes(query) || g.genre.toLowerCase().includes(query));
            displayGames(filtered);
        }

        // Close modal if user clicks background overlay
        window.onclick = function(event) {
            if (event.target == modal) { closeGame(); }
        }

        // Initialize display
        displayGames(games);
    </script>
</body>
</html>
