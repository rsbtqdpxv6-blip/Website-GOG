<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SNES EmulatorJS + Save States</title>

  <link rel="stylesheet" href="emulatorjs/data/emulator.css">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #topbar {
      padding: 10px;
      background: #222;
    }

    select, button {
      padding: 8px;
      margin: 5px;
      font-size: 14px;
    }

    #game {
      width: 100vw;
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

  <div id="topbar">
    <select id="romSelect">
      <option value="roms/super-mario-world.sfc">Super Mario World</option>
      <option value="roms/zelda.sfc">Zelda: A Link to the Past</option>
    </select>

    <button onclick="loadROM()">Load</button>
    <button onclick="saveState()">Save</button>
    <button onclick="loadState()">Load</button>
    <button onclick="fullscreen()">Fullscreen</button>
  </div>

  <div id="game"></div>

  <script>
    let currentRom = "";
    let emulatorReady = false;

    function startEmu(rom) {
      currentRom = rom;
      emulatorReady = false;

      document.getElementById("game").innerHTML = "";

      EJS_player = "#game";
      EJS_core = "snes";
      EJS_gameUrl = rom;
      EJS_pathtodata = "emulatorjs/data/";
      EJS_startOnLoaded = true;

      // Hook into EmulatorJS lifecycle
      EJS_onLoad = function() {
        emulatorReady = true;
      };

      const script = document.createElement("script");
      script.src = "emulatorjs/data/loader.js";
      document.body.appendChild(script);
    }

    function loadROM() {
      startEmu(document.getElementById("romSelect").value);
    }

    function fullscreen() {
      document.getElementById("game").requestFullscreen();
    }

    // ===== SAVE / LOAD STATES =====

    function saveState() {
      if (!emulatorReady || !window.EJS_emulator) {
        alert("Emulator not ready yet!");
        return;
      }

      try {
        EJS_emulator.saveState();
        alert("State saved!");
      } catch (e) {
        console.log(e);
        alert("Save failed");
      }
    }

    function loadState() {
      if (!emulatorReady || !window.EJS_emulator) {
        alert("Emulator not ready yet!");
        return;
      }

      try {
        EJS_emulator.loadState();
        alert("State loaded!");
      } catch (e) {
        console.log(e);
        alert("Load failed");
      }
    }

    window.onload = () => {
      loadROM();
    };
  </script>

</body>
</html>
