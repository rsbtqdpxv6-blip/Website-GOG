<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNES Emulator</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#ui {
    padding: 10px;
}

canvas {
    width: 768px;
    height: 672px;
    image-rendering: pixelated;
    background: black;
}
</style>
</head>

<body>

<div id="ui">
    <input type="file" id="rom">
</div>

<canvas id="screen" width="256" height="224"></canvas>

<script>
/*
IMPORTANT FIX:
We DO NOT redeclare Module if snes.js already defines it.
We only safely extend it.
*/

window.Module = window.Module || {};

// wait for canvas
Module.canvas = document.getElementById("screen");

// DO NOT override Module completely (THIS FIXES YOUR ERROR)
Module.locateFile = function(path) {
    return path;
};

// safe hook
Module.onRuntimeInitialized = function() {
    console.log("SNES WASM loaded successfully");

    if (!Module._frame) {
        console.warn("Warning: _frame not found in WASM exports");
    }
};

// expose back
window.Module = Module;
</script>

<script src="snes.js"></script>

<script>
/* ROM loader */
document.getElementById("rom").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    const data = new Uint8Array(await file.arrayBuffer());

    console.log("ROM loaded:", data.length);

    if (!Module._malloc || !Module._loadRom) {
        alert("WASM exports missing (_malloc or _loadRom not found)");
        return;
    }

    const ptr = Module._malloc(data.length);
    Module.HEAPU8.set(data, ptr);

    Module._loadRom(ptr, data.length);

    if (Module._start) Module._start();
});

/* 60 FPS loop */
function loop() {
    if (Module._frame) Module._frame();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>
