<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNES Emulator</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#top {
    padding: 10px;
}

canvas {
    width: 768px;
    height: 672px;
    image-rendering: pixelated;
    background: black;
}
</style>
</head>

<body>

<div id="top">
    <input type="file" id="rom">
</div>

<canvas id="screen" width="256" height="224"></canvas>

<script>
/* =========================
   SAFE EMSCRIPTEN MODULE
   ========================= */

window.Module = window.Module || {};

Module.canvas = document.getElementById("screen");

Module.locateFile = function(path) {
    return "./" + path;
};

Module.onRuntimeInitialized = function() {
    console.log("SNES WASM loaded");

    // debug what we actually got
    console.log("Module keys:", Object.keys(Module));
};
</script>

<script src="snes.js"></script>

<script>
let romPtr = null;

/* =========================
   ROM LOADER
   ========================= */
document.getElementById("rom").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    const rom = new Uint8Array(await file.arrayBuffer());

    console.log("ROM size:", rom.length);

    if (!Module._malloc) {
        alert("WASM not ready or invalid Snes9x build.");
        return;
    }

    romPtr = Module._malloc(rom.length);
    Module.HEAPU8.set(rom, romPtr);

    /* Try common Snes9x entry points safely */
    if (Module.ccall) {
        try {
            Module.ccall(
                "loadROM",
                null,
                ["number", "number"],
                [romPtr, rom.length]
            );
        } catch (e) {
            console.warn("loadROM failed:", e);
        }
    } else {
        alert("This Snes9x build does not use ccall. Wrong WASM build.");
    }
});

/* =========================
   60 FPS EMULATION LOOP
   ========================= */
function loop() {
    try {
        if (Module.ccall) {
            Module.ccall("runFrame", null, [], []);
        }
    } catch (e) {
        // ignore frame errors
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
