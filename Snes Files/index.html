<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SNES EmulatorJS - ROM Selector</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #topbar {
      padding: 10px;
      background: #222;
    }

    select, button {
      padding: 8px;
      margin: 5px;
      font-size: 14px;
    }

    #game {
      width: 100vw;
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

  <div id="topbar">
    <select id="romSelect">
      <option value="roms/super-mario-world.sfc">Super Mario World</option>
      <option value="roms/donkey-kong-country.sfc">Donkey Kong Country</option>
      <option value="roms/zelda-alttp.sfc">Zelda: A Link to the Past</option>
    </select>

    <button onclick="loadROM()">Load Game</button>
    <button onclick="goFullscreen()">Fullscreen</button>
  </div>

  <div id="game"></div>

  <script>
    let currentGame = "roms/super-mario-world.sfc";

    function startEmulator(rom) {
      document.getElementById("game").innerHTML = "";

      EJS_player = "#game";
      EJS_core = "snes";
      EJS_gameUrl = rom;
      EJS_pathtodata = "https://cdn.emulatorjs.org/latest/data/";
      EJS_startOnLoaded = true;
      EJS_fullscreenOnLoaded = false;

      const script = document.createElement("script");
      script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
      document.body.appendChild(script);
    }

    function loadROM() {
      currentGame = document.getElementById("romSelect").value;
      startEmulator(currentGame);
    }

    function goFullscreen() {
      const elem = document.getElementById("game");

      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    // auto-load first ROM
    window.onload = () => {
      startEmulator(currentGame);
    };
  </script>

  <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>

</body>
</html>
