<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNES Emulator</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
}

canvas {
    width: 768px;
    height: 672px;
    image-rendering: pixelated;
    background: black;
    margin-top: 10px;
}

#ui {
    padding: 10px;
}
</style>
</head>

<body>

<div id="ui">
    <input type="file" id="rom">
</div>

<canvas id="screen" width="256" height="224"></canvas>

<script>
/* =========================
   SAFE EMSCRIPTEN MODULE
   ========================= */

window.Module = window.Module || {};

Module.canvas = document.getElementById("screen");

Module.locateFile = function(path) {
    return "./" + path;
};

Module.onRuntimeInitialized = function () {
    console.log("SNES WASM LOADED");

    // DEBUG: show what we actually got
    console.log("Module exports:", Object.keys(Module));
};
</script>

<script src="snes.js"></script>

<script>
/* =========================
   HELPERS
   ========================= */

function call(name, args = []) {
    try {
        if (Module.ccall) {
            return Module.ccall(name, null, [], args);
        }
    } catch (e) {
        // ignore missing functions
    }
}

/* =========================
   ROM LOADER
   ========================= */

document.getElementById("rom").addEventListener("change", async (e) => {
    const rom = new Uint8Array(await e.target.files[0].arrayBuffer());

    console.log("ROM loaded:", rom.length);

    if (!Module._malloc) {
        alert("WASM not ready or invalid build");
        return;
    }

    const ptr = Module._malloc(rom.length);
    Module.HEAPU8.set(rom, ptr);

    // TRY COMMON SNES9X FUNCTION NAMES
    call("load_rom", [ptr, rom.length]);
    call("loadROM", [ptr, rom.length]);
    call("snes_load_rom", [ptr, rom.length]);
    call("load_game", [ptr, rom.length]);
});

/* =========================
   60 FPS LOOP
   ========================= */

function frameLoop() {
    call("run_frame");
    call("runFrame");
    call("snes_run");
    call("frame");

    requestAnimationFrame(frameLoop);
}

requestAnimationFrame(frameLoop);
</script>

</body>
</html>
