<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNES Emulator</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* top bar */
#ui {
    padding: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #4f46e5;
    color: white;
}

button:hover {
    background: #4338ca;
}

/* canvas */
#screen {
    width: 768px;
    height: 672px;
    image-rendering: pixelated;
    background: black;
}
</style>
</head>

<body>

<div id="ui">
    <input type="file" id="romInput" accept=".sfc,.smc,.zip">
    <button onclick="toggleFS()">Fullscreen</button>
</div>

<canvas id="screen" width="256" height="224"></canvas>

<script>
/*
IMPORTANT:
This assumes your SNES WASM build exposes a Module object like:
- Module._loadRom(...)
- Module._frame()
- Module.canvas or Module.setCanvas(...)
*/

const canvas = document.getElementById("screen");

const Module = {
    canvas: canvas,

    // IMPORTANT for GitHub Pages WASM loading
    locateFile(path) {
        return path;
    },

    onRuntimeInitialized() {
        console.log("SNES core loaded");
    }
};

// Attach module globally for your wasm bundle
window.Module = Module;

/* ROM LOADER */
document.getElementById("romInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    const data = new Uint8Array(await file.arrayBuffer());

    if (!Module._malloc || !Module._loadRom) {
        alert("Your WASM build is missing required SNES functions.");
        return;
    }

    const ptr = Module._malloc(data.length);
    Module.HEAPU8.set(data, ptr);

    Module._loadRom(ptr, data.length);
    Module._start();
});

/* 60 FPS loop */
function loop() {
    if (Module._frame) Module._frame();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* fullscreen */
function toggleFS() {
    if (!document.fullscreenElement) {
        canvas.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}
</script>

<!-- YOUR EMULATOR FILES (IMPORTANT) -->
<script src="snes.js"></script>

</body>
</html>
