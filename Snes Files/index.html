<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SNES Emulator (Offline)</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    canvas {
      width: 512px;
      height: 448px;
      image-rendering: pixelated;
      border: 2px solid white;
      background: black;
    }

    #ui {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <canvas id="screen" width="256" height="224"></canvas>

  <div id="ui">
    <input type="file" id="rom" accept=".sfc,.smc">
  </div>

  <!-- Your compiled emulator -->
  <script src="emulator.js"></script>

  <script>
    const canvas = document.getElementById("screen");

    let romPtr = 0;

function alloc(size) {
  if (Module._malloc) return Module._malloc(size);
  if (Module.malloc) return Module.malloc(size);

  throw new Error("No malloc function found in WASM exports");
}

    // =========================
    // WASM MODULE SETUP
    // =========================
    const Module = {
      canvas: canvas,

      locateFile(path) {
        return path; // required for file:// usage
      },

      onRuntimeInitialized() {
        console.log("✅ WASM initialized");

        // Try common reset calls
        if (Module._reset) Module._reset();
        if (Module._init) Module._init();

        startLoop();
      }
    };

    // =========================
    // EMULATION LOOP
    // =========================
    function startLoop() {
      function frame() {
        if (Module._frame) Module._frame();
        else if (Module._step) Module._step();
        else if (Module._runFrame) Module._runFrame();

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    // =========================
    // ROM LOADER
    // =========================
    document.getElementById("rom").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const rom = new Uint8Array(await file.arrayBuffer());

  console.log("ROM loaded:", rom.length);

  // 🔥 TRY COMMON NON-MALLOC APIs

  if (Module.loadRom) {
    console.log("Using Module.loadRom(Uint8Array)");
    Module.loadRom(rom);
  }

  else if (Module.loadROM) {
    console.log("Using Module.loadROM(Uint8Array)");
    Module.loadROM(rom);
  }

  else if (Module.ccall) {
    console.log("Using ccall(loadRom)");
    Module.ccall("loadRom", null, ["array"], [rom]);
  }

  else if (Module.instance?.exports?.loadRom) {
    console.log("Using instance.exports.loadRom");
    Module.instance.exports.loadRom(rom);
  }

  else {
    console.error("❌ No ROM loading function found in your WASM build");
  }

  // start emulator if needed
  if (Module.start) Module.start();
  if (Module.run) Module.run();
});

console.log("MODULE KEYS:", Object.keys(Module));

    // =========================
    // INPUT (basic SNES mapping)
    // =========================
    const keyMap = {
      z: 0,       // A
      x: 1,       // B
      a: 2,       // X
      s: 3,       // Y
      Enter: 4,   // Start
      Shift: 5    // Select
    };

    window.addEventListener("keydown", (e) => {
      const code = keyMap[e.key];
      if (code !== undefined && Module._keyDown) {
        Module._keyDown(code);
      }
    });

    window.addEventListener("keyup", (e) => {
      const code = keyMap[e.key];
      if (code !== undefined && Module._keyUp) {
        Module._keyUp(code);
      }
    });

    // =========================
    // DEBUG HELPERS
    // =========================
    window.Module = Module;

    console.log("🧠 Emulator loader ready");
  </script>

</body>
</html>
