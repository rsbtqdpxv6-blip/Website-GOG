<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1c1c1e; color: #fff; }
        .navbar { display: flex; padding: 12px; background: #2c2c2e; gap: 10px; align-items: center; border-bottom: 1px solid #3a3a3c; }
        .address-bar { flex-grow: 1; padding: 10px 16px; border: none; border-radius: 20px; font-size: 14px; background: #1c1c1e; color: #fff; }
        .address-bar:focus { outline: 2px solid #0a84ff; }
        .btn { padding: 10px 24px; background: #0a84ff; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn:hover { background: #0070e0; }
        .viewport { flex-grow: 1; border: none; background: #ffffff; }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="urlInput" class="address-bar" value="wikipedia.org" placeholder="Type a site name...">
        <button class="btn" onclick="launchSite()">Go</button>
    </div>

    <iframe id="viewport" class="viewport"></iframe>

    <script>
        function launchSite() {
            let target = document.getElementById('urlInput').value.trim();
            if (!target) return;

            // Strip any protocol prefixes if the user types them manually
            target = target.replace(/^https?:\/\//i, '');
            document.getElementById('urlInput').value = target;

            // This funnels the request entirely through Google's unblockable developer cache
            const googleProxy = "https://googleusercontent.com";
            const finalUrl = "https://" + target;

            // Inject the link straight into the frame layout
            document.getElementById('viewport').src = googleProxy + encodeURIComponent(finalUrl);
        }

        window.onload = launchSite;
    </script>

</body>
</html>
