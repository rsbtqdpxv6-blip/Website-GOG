<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Web Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #202124; color: #fff; }
        
        /* Navigation Controls */
        .navbar { display: flex; padding: 10px; background: #35363a; gap: 10px; align-items: center; border-bottom: 1px solid #4a4a4a; }
        .address-bar { flex-grow: 1; padding: 10px 16px; border: none; border-radius: 24px; font-size: 14px; background: #202124; color: white; }
        .address-bar:focus { outline: 2px solid #8ab4f8; }
        .btn { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: 500; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background: #1557b0; }
        
        /* Viewport Canvas */
        .browser-viewport { flex-grow: 1; border: none; background: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="urlInput" class="address-bar" value="https://old.reddit.com" placeholder="Enter website URL (e.g., old.reddit.com)..." onkeydown="if(event.key === 'Enter') launchSite()">
        <button class="btn" onclick="launchSite()">Go</button>
    </div>

    <!-- The actual webpage will display here -->
    <iframe id="viewport" class="browser-viewport"></iframe>

    <script>
        const iframe = document.getElementById('viewport');
        // Your exact personal unblocked backend link
        const proxyBackend = 'https://github.dev';

        async function launchSite() {
            let targetUrl = document.getElementById('urlInput').value.trim();
            if (!targetUrl) return;

            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'https://' + targetUrl;
            }
            document.getElementById('urlInput').value = targetUrl;

            try {
                // Fetch the site data directly through your unblocked server endpoint
                const response = await fetch(proxyBackend + targetUrl);
                let htmlText = await response.text();

                // Inject a base layout tag so stylesheets, assets, and internal clicks map natively
                const baseTag = `<base href="${targetUrl}/" target="_self">`;
                
                // Keep the cross-site script configurations contained
                if (htmlText.includes('<head>')) {
                    htmlText = htmlText.replace('<head>', `<head>${baseTag}`);
                } else {
                    htmlText = baseTag + htmlText;
                }

                // Convert text into a safe local source blob to strip away iframe headers natively
                const safeBlob = new Blob([htmlText], { type: 'text/html' });
                iframe.src = URL.createObjectURL(safeBlob);

            } catch (err) {
                iframe.srcdoc = `
                    <div style="font-family:sans-serif; padding:40px; text-align:center; color:#333;">
                        <h2>Proxy Bridge Connection Failure</h2>
                        <p>${err.message}</p>
                        <p>Verify your Codespace terminal is running <b>node server.js</b> and Port <b>8080</b> is set to <b>Public</b>.</p>
                    </div>`;
            }
        }

        // Initialize layout on startup
        window.onload = launchSite;
    </script>

</body>
</html>
