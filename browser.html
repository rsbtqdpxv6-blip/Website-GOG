<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Web Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #202124; color: #fff; }
        
        /* Navigation Controls */
        .navbar { display: flex; padding: 10px; background: #35363a; gap: 10px; align-items: center; border-bottom: 1px solid #4a4a4a; }
        .address-bar { flex-grow: 1; padding: 10px 16px; border: none; border-radius: 24px; font-size: 14px; background: #202124; color: white; }
        .address-bar:focus { outline: 2px solid #8ab4f8; }
        .btn { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: 500; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background: #1557b0; }
        
        /* Viewport Canvas */
        .browser-viewport { flex-grow: 1; border: none; background: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="urlInput" class="address-bar" value="https://reddit.com" placeholder="Enter website URL (e.g., old.reddit.com)..." onkeydown="if(event.key === 'Enter') launchSite()">
        <button class="btn" onclick="launchSite()">Go</button>
    </div>

    <!-- The actual webpage displays inside this container -->
    <iframe id="viewport" class="browser-viewport"></iframe>

    <script>
        const scopePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const iframe = document.getElementById('viewport');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js', { scope: scopePath })
            .then(() => console.log("Gateway Engine Online."))
            .catch(err => console.error("Worker Registration Failed:", err));
        }

        function launchSite() {
            let targetUrl = document.getElementById('urlInput').value.trim();
            if (!targetUrl) return;

            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'https://' + targetUrl;
            }
            document.getElementById('urlInput').value = targetUrl;
            
            // Route initial launch through the scope loop
            iframe.src = window.location.origin + scopePath + 'proxy-gateway/' + encodeURIComponent(targetUrl);
        }

        // INTERCEPT INTERNAL LINKS: Forces links clicked inside the iframe to stay in the proxy
        iframe.addEventListener('load', function() {
            try {
                // Read the active page content inside the frame
                const frameWindow = iframe.contentWindow || iframe.contentDocument.defaultView;
                
                // Watch every click event inside the embedded site
                frameWindow.document.addEventListener('click', function(e) {
                    const closestLink = e.target.closest('a');
                    
                    if (closestLink && closestLink.href) {
                        e.preventDefault(); // Stop Firefox from loading the raw link directly
                        
                        let clickedUrl = closestLink.href;
                        document.getElementById('urlInput').value = clickedUrl;
                        
                        // Force rewrite the link and push it back through your gateway tunnel
                        iframe.src = window.location.origin + scopePath + 'proxy-gateway/' + encodeURIComponent(clickedUrl);
                    }
                }, true);
            } catch (err) {
                // If a site features deep security, fallback silently to avoid breaking the window layout
                console.log("Cross-origin frame click capture limited: ", err.message);
            }
        });

        window.onload = () => { setTimeout(launchSite, 500); };
    </script>

</body>
</html>
