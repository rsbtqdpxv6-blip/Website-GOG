<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent HTML Web Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1c1c1e; color: #fff; }
        
        /* Minimal Address Bar */
        .nav-bar { display: flex; padding: 12px; background: #2c2c2e; gap: 10px; align-items: center; border-bottom: 1px solid #3a3a3c; }
        .address-input { flex-grow: 1; padding: 10px 16px; border: none; border-radius: 20px; font-size: 14px; background: #1c1c1e; color: #fff; }
        .address-input:focus { outline: 2px solid #0a84ff; }
        .action-btn { padding: 10px 24px; background: #0a84ff; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .action-btn:hover { background: #0070e0; }
        
        /* Sandbox Viewport */
        .frame-canvas { flex-grow: 1; border: none; background: #ffffff; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <input type="text" id="targetUrl" class="address-input" value="https://example.com" placeholder="Type a website URL and press Enter..." onkeydown="if(event.key === 'Enter') requestPage()">
        <button class="action-btn" onclick="requestPage()">Launch</button>
    </div>

    <!-- Isolated Sandbox Window -->
    <iframe id="viewCanvas" class="frame-canvas" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>

    <script>
        async function requestPage() {
            let url = document.getElementById('targetUrl').value.trim();
            const canvas = document.getElementById('viewCanvas');

            if (!url) return;
            if (!/^https?:\/\//i.test(url)) { url = 'https://' + url; }
            document.getElementById('targetUrl').value = url;

            try {
                // Uses an open text-stream protocol to pull raw website code straight into your local browser storage
                const targetResponse = await fetch(`https://allorigins.win{encodeURIComponent(url)}`);
                let htmlContent = await targetResponse.text();

                // Inject a base target tag so images/stylesheets load correctly from the original host
                const baseTag = `<base href="${url}/" target="_self">`;
                htmlContent = htmlContent.replace('<head>', `<head>${baseTag}`);

                // Strip standard header payload elements locally out of the text string
                const sanitizedBlob = new Blob([htmlContent], { type: 'text/html' });
                canvas.src = URL.createObjectURL(sanitizedBlob);

            } catch (err) {
                // Fallback layout if the site has strict network security protections
                canvas.srcdoc = `
                    <div style="font-family:sans-serif; padding:40px; color:#333; text-align:center;">
                        <h2>Loading Frame Security Restrictions</h2>
                        <p>This site blocks direct embedding. Try testing with simpler text sites (e.g., <b>wikipedia.org</b> or <b>example.com</b>).</p>
                        <small style="color:#999;">Error Details: ${err.message}</small>
                    </div>`;
            }
        }

        // Auto-load home screen
        window.onload = requestPage;
    </script>

</body>
</html>
