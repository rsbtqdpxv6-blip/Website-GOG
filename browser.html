<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Hosted HTML Browser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #202124; color: white; }
        
        /* Navigation UI */
        .navbar { display: flex; padding: 10px; background: #35363a; gap: 10px; align-items: center; }
        .address-bar { flex-grow: 1; padding: 10px 16px; border: none; border-radius: 24px; font-size: 14px; background: #202124; color: white; }
        .address-bar:focus { outline: 2px solid #8ab4f8; }
        .btn { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: 500; }
        .btn:hover { background: #1557b0; }
        
        /* Web Viewport */
        .viewport-frame { flex-grow: 1; border: none; background: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="urlBar" class="address-bar" value="https://example.com" onkeydown="if(event.key === 'Enter') browseToSite()">
        <button class="btn" onclick="browseToSite()">Go</button>
    </div>

    <!-- The actual webpage displays inside this canvas -->
    <iframe id="browserWindow" class="viewport-frame"></iframe>

    <script>
        // Setup internal environment pathing safely on GitHub Pages
        const scopePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

        // Register the background gateway engine
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js', { scope: scopePath })
            .then(() => console.log("Engine Active."))
            .catch(err => console.error("Activation Failed:", err));
        }

        function browseToSite() {
            let targetUrl = document.getElementById('urlBar').value.trim();
            
            // Automatically patch links missing standard protocol prefixes
            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'https://' + targetUrl;
            }
            document.getElementById('urlBar').value = targetUrl;
            
            // Pass the target directly through the secure service worker layout path
            document.getElementById('browserWindow').src = window.location.origin + scopePath + 'proxy-gateway/' + encodeURIComponent(targetUrl);
        }

        // Run default site configuration upon launching layout
        window.onload = () => { setTimeout(browseToSite, 500); };
    </script>

</body>
</html>
