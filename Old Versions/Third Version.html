<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wesley's Proxy and Game links :D</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #577694;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .toggle-btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 30px;
        }

        .toggle-btn:hover { background-color: #4338ca; }
        .toggle-btn:active { transform: scale(0.98); }

        .image-viewer-container {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        .viewer-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .close-img-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 3px 4px;
            font-size: 5px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            z-index: 10000;
        }

        .directory-container {
            width: 100%;
            max-width: 500px;
            display: none;
        }

        .category-section {
            margin-bottom: 25px;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .category-title {
            font-size: 16px;
            font-weight: 700;
        }

        .link-list { list-style: none; padding: 0; }
        .link-item { margin-bottom: 8px; }

        .link-item a {
            display: block;
            color: #1e293b;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 6px;
            background-color: #f8fafc;
        }

        /* NES OVERLAY */
        #nesOverlay {
            display: none;
            position: fixed;
            z-index: 99999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: black;
        }

        #nesCanvas {
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
        }

        #nesMenu {
            position: absolute;
            top: 60px;
            left: 60px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 100001;
            font-family: Segoe UI;
        }
    </style>
</head>

<body>

<div style="display:flex; gap:15px;">
    <button class="toggle-btn" id="toggleBtn">Open Proxy Links</button>
    <button class="toggle-btn" id="openImgBtn" style="background:#10b981;">View Picture</button>
</div>

<div class="image-viewer-container" id="imageViewer">
    <img class="viewer-image" src="Screenshot 2026-06-12 2.41.28 PM.png">
    <button class="close-img-btn" id="closeImgBtn">✕</button>
</div>

<div class="directory-container" id="directory"></div>

<h1>Sites And Games</h1>

<button class="toggle-btn" id="openNESBtn" style="background:#f59e0b;">
    Play NES Games
</button>

<!-- NES OVERLAY -->
<div id="nesOverlay">
    <button class="close-img-btn" id="closeNESBtn">✕</button>

    <canvas id="nesCanvas" width="256" height="240"></canvas>

    <div id="nesMenu">
        <h3>NES Games</h3>
        <div id="romList"></div>
        <hr>
        <input type="file" id="romPicker" accept=".nes">
    </div>
</div>

<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>

<script>
const myLinkDirectory = {
    "Development Tools and Proxies to find and stuff": [
        "https://github.com",
        "https://gitlab.com"
    ],
    "WIKIPEDIA IS UNTRUSTED- SCHOOL (who cares?)": [
        "https://wikipedia.org"
    ],
    "Social Media": [
        "https://reddit.com",
        "https://youtube.com"
    ],
    "The GitHub Link to Update your HTML! (go to tags or releases)": [
        "https://github.com/rsbtqdpxv6-blip/Html-GOG-Bypass"
    ]
};

const toggleBtn = document.getElementById('toggleBtn');
const directory = document.getElementById('directory');
const openImgBtn = document.getElementById('openImgBtn');
const imageViewer = document.getElementById('imageViewer');

function buildDirectory() {
    for (const [categoryName, urls] of Object.entries(myLinkDirectory)) {
        const section = document.createElement('div');
        section.className = 'category-section';

        const title = document.createElement('h2');
        title.textContent = categoryName;
        section.appendChild(title);

        const ul = document.createElement('ul');
        urls.forEach(url => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = url;
            a.target = "_blank";
            a.textContent = url;
            li.appendChild(a);
            ul.appendChild(li);
        });

        section.appendChild(ul);
        directory.appendChild(section);
    }
}

toggleBtn.onclick = () => {
    directory.style.display =
        directory.style.display === 'block' ? 'none' : 'block';
};

openImgBtn.onclick = () => imageViewer.style.display = 'flex';
document.getElementById('closeImgBtn').onclick = () => imageViewer.style.display = 'none';

window.addEventListener('keydown', e => {
    if (e.key === 'Escape') imageViewer.style.display = 'none';
});

/* ================= NES ================= */

const openNESBtn = document.getElementById("openNESBtn");
const nesOverlay = document.getElementById("nesOverlay");
const closeNESBtn = document.getElementById("closeNESBtn");
const romList = document.getElementById("romList");
const romPicker = document.getElementById("romPicker");
const canvas = document.getElementById("nesCanvas");
const ctx = canvas.getContext("2d");

const roms = [
    { name: "Super Mario Bros", file: "mario.nes" }
];
const keys = {
    ArrowUp: jsnes.Controller.BUTTON_UP,
    ArrowDown: jsnes.Controller.BUTTON_DOWN,
    ArrowLeft: jsnes.Controller.BUTTON_LEFT,
    ArrowRight: jsnes.Controller.BUTTON_RIGHT,
    KeyZ: jsnes.Controller.BUTTON_A,
    KeyX: jsnes.Controller.BUTTON_B,
    Enter: jsnes.Controller.BUTTON_START,
    ShiftRight: jsnes.Controller.BUTTON_SELECT
};

window.addEventListener("keydown", e => {
    if (keys[e.code] !== undefined) {
        nes.buttonDown(1, keys[e.code]);
    }
});

window.addEventListener("keyup", e => {
    if (keys[e.code] !== undefined) {
        nes.buttonUp(1, keys[e.code]);
    }
});

let nes = new jsnes.NES({
    onFrame: function(frameBuffer) {
        const imageData = ctx.createImageData(256, 240);
        const data = imageData.data;

        for (let i = 0; i < frameBuffer.length; i++) {
            const pixel = frameBuffer[i];
            imageData.data[i * 4]     = pixel & 0xFF;        // R
            imageData.data[i * 4 + 1] = (pixel >> 8) & 0xFF; // G
            imageData.data[i * 4 + 2] = (pixel >> 16) & 0xFF;// B
            imageData.data[i * 4 + 3] = 255;        }

        ctx.putImageData(imageData, 0, 0);
    }
});

let running = false;

function runNES() {
    if (!running) return;

    nes.frame();
    setTimeout(runNES, 1000 / 60);
}

function loadROM(data) {
    nes.loadROM(data);

    document.getElementById("nesMenu").style.display = "none";

    running = true;
    runNES();
}

function buildRomList() {
    romList.innerHTML = "";
    roms.forEach(r => {
        const btn = document.createElement("button");
        btn.textContent = r.name;
        btn.onclick = () => {
            fetch(r.file)
                .then(res => res.arrayBuffer())
                .then(data => loadROM(new Uint8Array(data)));
        };
        romList.appendChild(btn);
    });
}

romPicker.addEventListener("change", e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => loadROM(new Uint8Array(reader.result));
    reader.readAsArrayBuffer(file);
});

openNESBtn.onclick = () => {
    nesOverlay.style.display = "block";
    buildRomList();
};

closeNESBtn.onclick = () => {
    nesOverlay.style.display = "none";
    document.getElementById("nesMenu").style.display = "block";
    running = false;
};

buildRomList();
buildDirectory();
</script>

</body>
</html>
