<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nintendo 64 EmulatorJS</title>

  <link rel="stylesheet" href="emulatorjs/data/emulator.css">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #topbar {
      padding: 10px;
      background: #222;
    }

    select, button {
      padding: 10px;
      margin: 5px;
    }

    #game {
      width: 100vw;
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

<div id="topbar">
  <select id="romSelect">
    <option value="./roms/n64/mario64.z64">Super Mario 64</option>
    <option value="./roms/n64/oot.z64">The Legend of Zelda: Ocarina of Time</option>
  </select>

  <button onclick="changeROM()">Load</button>
  <button onclick="fullscreen()">Fullscreen</button>
</div>

<div id="game"></div>

<script>
let currentRom = localStorage.getItem("n64_rom") || "./roms/n64/mario64.z64";
let emulatorReady = false;

document.getElementById("romSelect").value = currentRom;

// EmulatorJS config
EJS_player = "#game";
EJS_core = "parallel-n64";
EJS_gameUrl = currentRom;
EJS_pathtodata = "emulatorjs/data/";
EJS_language = "en-US";
EJS_startOnLoaded = true;

EJS_onLoad = function () {
  emulatorReady = true;
};

function changeROM() {
  const selected = document.getElementById("romSelect").value;
  localStorage.setItem("n64_rom", selected);
  location.reload();
}

function fullscreen() {
  document.getElementById("game").requestFullscreen();
}
</script>

<script src="coi-serviceworker.js"></script>
<script src="emulatorjs/data/loader.js"></script>

</body>
</html>
