    <style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #577694;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
}

/* ===== BUTTONS ===== */
.toggle-btn {
    background-color: #4f46e5;
    color: white;
    border: none;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    transition: 0.2s ease;
    margin: 6px;
}

.toggle-btn:hover {
    background-color: #4338ca;
    transform: translateY(-1px);
}

.toggle-btn:active {
    transform: scale(0.98);
}

button {
    font-family: inherit;
}

.directory-container {
    width: 100%;
    max-width: 520px;
    display: none;
}

.category-section {
    margin-bottom: 18px;
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.category-section h2 {
    font-size: 15px;
    margin-bottom: 10px;
}

/* links */
.link-list { list-style: none; padding: 0; margin: 0; }

.link-item { margin-bottom: 8px; }

.link-item a {
    display: block;
    color: #1e293b;
    text-decoration: none;
    padding: 10px 12px;
    border-radius: 8px;
    background-color: #f8fafc;
    transition: 0.2s;
}

.link-item a:hover {
    background-color: #e2e8f0;
}

/* ===== IMAGE VIEWER ===== */
.image-viewer-container {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
}

.viewer-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.close-img-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 10px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,255,0.3);
}

.modal-content {
    position: relative;
    background: white;
    margin: 5% auto;
    padding: 25px;
    width: 80%;
    height: 80%;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.modal-iframe {
    width: 100%;
    height: 95%;
    border: none;
}

/* close button */
.close-btn {
    position: absolute;
    right: 12px;
    top: 10px;
    font-size: 26px;
    cursor: pointer;
    color: #666;
}

.close-btn:hover {
    color: #000;
}

</style>

<body>

<h1>Sites And Games</h1>

<script>
const myLinkDirectory = {
    "Development Tools and Proxies to find and stuff": [
        "https://github.com",
        "https://gitlab.com"
    ],
    "WIKIPEDIA IS UNTRUSTED- SCHOOL (who cares?)": [
        "https://wikipedia.org"
    ],
    "Social Media": [
        "https://reddit.com",
        "https://youtube.com"
    ],
    "The GitHub Link for the Older releases.": [
        "https://github.com/rsbtqdpxv6-blip/Html-GOG-Bypass"
    ]
};

const toggleBtn = document.getElementById('toggleBtn');
const directory = document.getElementById('directory');
const openImgBtn = document.getElementById('openImgBtn');
const imageViewer = document.getElementById('imageViewer');

function buildDirectory() {
    for (const [categoryName, urls] of Object.entries(myLinkDirectory)) {
        const section = document.createElement('div');
        section.className = 'category-section';

        const title = document.createElement('h2');
        title.textContent = categoryName;
        section.appendChild(title);

        const ul = document.createElement('ul');
        urls.forEach(url => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = url;
            a.target = "_blank";
            a.textContent = url;
            li.appendChild(a);
            ul.appendChild(li);
        });

        section.appendChild(ul);
        directory.appendChild(section);
    }
}

toggleBtn.onclick = () => {
    directory.style.display =
        directory.style.display === 'block' ? 'none' : 'block';
};

openImgBtn.onclick = () => imageViewer.style.display = 'flex';
document.getElementById('closeImgBtn').onclick = () => imageViewer.style.display = 'none';

window.addEventListener('keydown', e => {
    if (e.key === 'Escape') imageViewer.style.display = 'none';
});
