<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GBC Emulator</title>

  <!-- EmulatorJS loader -->
  <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #game {
      width: 100%;
      height: 100vh;
      max-width: 900px;
    }

    .info {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="info">
    gbc Emulator (EJS)
  </div>

  <div id="game"></div>

  <script>
    EJS_player = "#game";
    EJS_core = "gb";
    EJS_gameUrl = "roms/your-game.gbc";
    EJS_startOnLoaded = true;
    EJS_fullscreenOnLoad = false;
    EJS_biosUrl = "";
    EJS_saveUrl = "saves/";
  </script>

</body>
</html>
