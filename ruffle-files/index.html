<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Flash Game Launcher</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle@0.3.0/ruffle.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar navigation list */
        #sidebar {
            width: 300px;
            background-color: var(--panel-color);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        .game-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .game-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .game-item:hover, .game-item.active {
            background-color: var(--accent-color);
        }

        .game-icon {
            font-size: 1.5rem;
            margin-right: 12px;
        }

        /* Main presentation environment */
        #main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #020617;
        }

        #toolbar {
            height: 60px;
            background-color: var(--panel-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #334155;
        }

        .controls button {
            background-color: #334155;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .controls button:hover {
            background-color: #475569;
        }

        /* Screen window housing Ruffle */
        #game-screen {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Ruffle element targets need strict sizing rules */
        #game-screen ruffle-player, #game-screen ruffle-embed {
            width: 100% !important;
            height: 100% !important;
        }

        .placeholder-text {
            color: #64748b;
            font-size: 1.2rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR NAVIGATION -->
    <div id="sidebar">
        <div class="sidebar-header">🕹️ Flash Arcade</div>
        <div class="game-list" id="gameList">
            <!-- Game data nodes are rendered dynamically here -->
        </div>
    </div>

    <!-- ARCADE DISPLAY PLATFORM -->
    <div id="main-view">
        <div id="toolbar">
            <h2 id="current-title" style="margin:0; font-size: 1.1rem;">Select a Game...</h2>
            <div class="controls" id="controlGroup" style="display: none;">
                <button onclick="controlPlayer('play')">▶ Play</button>
                <button onclick="controlPlayer('pause')">⏸ Pause</button>
                <button onclick="reloadGame()">🔄 Reset</button>
                <button onclick="toggleFullscreen()">📺 Fullscreen</button>
            </div>
        </div>
        
        <div id="game-screen" id="screen">
            <div class="placeholder-text" id="placeholder">Select an option from the menu to initialize compilation hooks.</div>
        </div>
    </div>

    <script>
        // CONFIGURATION: Add your specific files and titles below
        const gamesRegistry = [
            { id: "game1", title: "A Koopa's Revenge 2", path: "games/kooparevenge2.swf", icon: "🐢" },
            { id: "game2", title: "A Koopa's Revenge", path: "games/kooparevenge.swf", icon: "🐢" },
        ];

        let activePlayerInstance = null;
        let selectedGameIndex = null;

        // Populate sidebar registry fields
        const listContainer = document.getElementById("gameList");
        gamesRegistry.forEach((game, index) => {
            const item = document.createElement("div");
            item.className = "game-item";
            item.onclick = () => launchGame(index, item);
            item.innerHTML = `<span class="game-icon">${game.icon}</span> <span>${game.title}</span>`;
            listContainer.appendChild(item);
        });

        // Initialize runtime frame assembly hooks
        function launchGame(index, element) {
            selectedGameIndex = index;
            const targetGame = gamesRegistry[index];
            
            // Clean interface properties
            document.querySelectorAll('.game-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById("placeholder").style.display = "none";
            document.getElementById("controlGroup").style.display = "block";
            document.getElementById("current-title").innerText = targetGame.title;

            const viewport = document.getElementById("game-screen");
            viewport.innerHTML = ""; // Wipe old DOM canvas frameworks

            // Invoke global library execution interface bindings
            const ruffleInstance = window.RufflePlayer.newest();
            activePlayerInstance = ruffleInstance.createPlayer();
            viewport.appendChild(activePlayerInstance);

            // Pass execution routing payloads
            activePlayerInstance.load({
                url: targetGame.path,
                autoplay: "on", // Force continuous runtime sequencing
                allowScriptAccess: false // Security sandbox barrier
            });
        }

        // CONTROL APIS: Interact with inside runtime player logic blocks
        function controlPlayer(action) {
            if (!activePlayerInstance) return;
            if (action === 'pause') {
                activePlayerInstance.pause(); // Standard Ruffle pause instruction
            } else if (action === 'play') {
                activePlayerInstance.play();  // Standard Ruffle resume instruction
            }
        }

        function reloadGame() {
            if (selectedGameIndex !== null) {
                const items = document.querySelectorAll('.game-item');
                launchGame(selectedGameIndex, items[selectedGameIndex]);
            }
        }

        function toggleFullscreen() {
            const viewport = document.getElementById("game-screen");
            if (!document.fullscreenElement) {
                viewport.requestFullscreen().catch(err => {
                    alert(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
