<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SNES EmulatorJS + Persistent Saves</title>

  <link rel="stylesheet" href="emulatorjs/data/emulator.css">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #topbar {
      padding: 10px;
      background: #222;
    }

    select, button {
      padding: 8px;
      margin: 5px;
    }

    #game {
      width: 100vw;
      height: calc(100vh - 60px);
    }
  </style>
</head>
<body>

<div id="topbar">
  <select id="romSelect">
    <option value="/Website-GOG/snes-files/roms/super-mario-world.sfc">
    <option value="zelda">Zelda: A Link to the Past</option>
  </select>

  <button onclick="changeROM()">Load</button>
  <button onclick="saveState()">Save</button>
  <button onclick="loadState()">Load State</button>
  <button onclick="fullscreen()">Fullscreen</button>
</div>

<div id="game"></div>

<script>
let currentRom = localStorage.getItem("selected_rom") || "super-mario-world";
let emulatorReady = false;

document.getElementById("romSelect").value = currentRom;

function storageKey() {
  return "snes_save_" + currentRom;
}

// EmulatorJS config
EJS_player = "#game";
EJS_core = "snes";
EJS_gameUrl = "roms/" + currentRom + ".sfc";
EJS_pathtodata = "emulatorjs/data/";
EJS_language = "en-US";
EJS_startOnLoaded = true;

EJS_onLoad = function () {
  emulatorReady = true;

  const saved = localStorage.getItem(storageKey());

  if (saved && window.EJS_emulator) {
    try {
      const binary = Uint8Array.from(
        atob(saved),
        c => c.charCodeAt(0)
      );

      EJS_emulator.loadState(binary);
      console.log("Save restored");
    } catch (e) {
      console.error(e);
    }
  }
};

function changeROM() {
  const selected = document.getElementById("romSelect").value;

  localStorage.setItem("selected_rom", selected);

  location.reload();
}

function fullscreen() {
  document.getElementById("game").requestFullscreen();
}

function saveState() {
  if (!emulatorReady || !window.EJS_emulator) {
    alert("Emulator not ready");
    return;
  }

  try {
    const state = EJS_emulator.saveState();
    const binary = new Uint8Array(state);

    let str = "";
    for (let i = 0; i < binary.length; i++) {
      str += String.fromCharCode(binary[i]);
    }

    localStorage.setItem(storageKey(), btoa(str));

    alert("Saved!");
  } catch (e) {
    console.error(e);
    alert("Save failed");
  }
}

function loadState() {
  if (!emulatorReady || !window.EJS_emulator) {
    alert("Emulator not ready");
    return;
  }

  const saved = localStorage.getItem(storageKey());

  if (!saved) {
    alert("No save found");
    return;
  }

  try {
    const binary = Uint8Array.from(
      atob(saved),
      c => c.charCodeAt(0)
    );

    EJS_emulator.loadState(binary);

    alert("Loaded!");
  } catch (e) {
    console.error(e);
    alert("Load failed");
  }
}
</script>

<script src="emulatorjs/data/loader.js"></script>

</body>
</html>
