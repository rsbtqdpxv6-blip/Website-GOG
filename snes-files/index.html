<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SNES EmulatorJS + Persistent Saves</title>

  <link rel="stylesheet" href="emulatorjs/data/emulator.css">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #topbar {
      padding: 10px;
      background: #222;
    }

    select, button {
      padding: 8px;
      margin: 5px;
    }

    #game {
      width: 100vw;
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

  <div id="topbar">
    <select id="romSelect">
      <option value="super-mario-world">Super Mario World</option>
      <option value="zelda">Zelda: A Link to the Past</option>
    </select>

    <button onclick="loadROM()">Load</button>
    <button onclick="saveState()">Save</button>
    <button onclick="loadState()">Load</button>
    <button onclick="fullscreen()">Fullscreen</button>
  </div>

  <div id="game"></div>

  <script>
    let currentRom = "";
    let emulatorReady = false;
    let emulatorScriptLoaded = false;

    function storageKey() {
      return "snes_save_" + currentRom;
    }

    function startEmu(rom) {
      currentRom = rom;
      emulatorReady = false;

      document.getElementById("game").innerHTML = "";

      EJS_player = "#game";
      EJS_core = "snes";
      EJS_gameUrl = "roms/" + rom + ".sfc";
      EJS_pathtodata = "emulatorjs/data/";
      EJS_language = 'en-US'; //language
      EJS_startOnLoaded = true;

      EJS_onLoad = function() {
        emulatorReady = true;

        // 🔥 AUTO-RESTORE SAVE ON LOAD
        const saved = localStorage.getItem(storageKey());
        if (saved && window.EJS_emulator) {
          try {
            const binary = Uint8Array.from(atob(saved), c => c.charCodeAt(0));
            EJS_emulator.loadState(binary);
            console.log("Save state restored");
          } catch (e) {
            console.log("No valid save to restore");
          }
        }
      };

      if (!emulatorScriptLoaded) {
         const script = document.createElement("script");
         script.src = "emulatorjs/data/loader.js";
         document.body.appendChild(script);
         emulatorScriptLoaded = true;
}

    function loadROM() {
      startEmu(document.getElementById("romSelect").value);
    }

    function fullscreen() {
      document.getElementById("game").requestFullscreen();
    }

    // =========================
    // 💾 SAVE STATE (LOCALSTORAGE)
    // =========================
    function saveState() {
      if (!emulatorReady || !window.EJS_emulator) {
        alert("Emulator not ready!");
        return;
      }

      try {
        const state = EJS_emulator.saveState();

        // Convert to Base64
        const binary = new Uint8Array(state);
        const base64 = btoa(String.fromCharCode(...binary));

        localStorage.setItem(storageKey(), base64);

        alert("Saved to browser storage!");
      } catch (e) {
        console.log(e);
        alert("Save failed");
      }
    }

    // =========================
    // save state mechanism localstorage
    // =========================
    function loadState() {
      if (!emulatorReady || !window.EJS_emulator) {
        alert("Emulator not ready!");
        return;
      }

      try {
        const saved = localStorage.getItem(storageKey());
        if (!saved) {
          alert("No save found!");
          return;
        }

        const binary = Uint8Array.from(atob(saved), c => c.charCodeAt(0));
        EJS_emulator.loadState(binary);

        alert("Loaded from storage!");
      } catch (e) {
        console.log(e);
        alert("Load failed");
      }
    }

    window.onload = () => {
      loadROM();
    };
  </script>

</body>
</html>
