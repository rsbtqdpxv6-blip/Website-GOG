<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SNES Emulator (EmulatorJS)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    #topbar {
      padding: 10px;
      background: #1c1c1c;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button, input {
      padding: 6px 10px;
    }

    #game {
      width: 100vw;
      height: calc(100vh - 60px);
    }
  </style>
</head>

<body>

<div id="topbar">
  <input type="file" id="romFile" accept=".sfc,.smc,.zip" />

  <input type="text" id="romUrl" placeholder="ROM URL (optional)" size="40"/>

  <button onclick="loadUrl()">Load URL</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="game"></div>

<script>
let EJS_player = "#game";
let EJS_core = "snes";

let EJS_gameUrl = "";
let EJS_pathtodata = "snes-files/emulatorjs/data/";

// Enable advanced features
let EJS_DEBUG = false;
let EJS_startOnLoaded = true;

// Save states + persistent storage
let EJS_loadState = true;
let EJS_saveState = true;

// Enable cheats UI
let EJS_cheats = true;

// Enable gamepad
let EJS_gamepad = true;

// Enable autosave
let EJS_autosave = true;

// Shader options (CRT-style effects)
let EJS_shader = 0;

// Initialize EmulatorJS
const script = document.createElement("script");
script.src = "snes-files/emulatorjs/data/loader.js";
document.body.appendChild(script);

// ROM file loader
document.getElementById("romFile").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  startGame(url);
});

// URL loader
function loadUrl() {
  const url = document.getElementById("romUrl").value.trim();
  if (!url) return alert("Enter ROM URL");
  startGame(url);
}

// Start emulator
function startGame(url) {
  EJS_gameUrl = url;

  // Rebuild emulator instance
  document.getElementById("game").innerHTML = "";
  const s = document.createElement("script");
  s.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
  document.body.appendChild(s);
}

// Fullscreen toggle
function toggleFullscreen() {
  const el = document.getElementById("game");
  if (el.requestFullscreen) el.requestFullscreen();
}
</script>

</body>
</html>
